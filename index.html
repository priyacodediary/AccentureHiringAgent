<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Accenture Hiring Agent</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .candidate { border: 1px solid #ccc; padding: 10px; margin: 10px; }
    button { margin: 5px; }
  </style>
</head>
<body>
  <h1>HR Approval Workflow</h1>

  <!-- Job Profile Form -->
  <form id="jobForm">
    <label>Job Role: <input type="text" name="job_role" required></label><br>
    <label>Description: <input type="text" name="job_description" required></label><br>
    <label>Required Skills: <input type="text" name="required_skills" required></label><br>
    <label>Min Experience (years): <input type="number" name="min_experience" required></label><br>
    <button type="submit">Submit Job Profile</button>
  </form>

  <h2>Shortlisted Candidates</h2>
  <div id="candidates"></div>

  <script>
    const agentUrl = "https://hackagentathon-resource.services.ai.azure.com/api/projects/hackagentathon/agents/AccentureHiringAgent/protocols/openai/v1/responses";

    // Submit job profile to agent
    document.getElementById("jobForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const payload = {
        input: [{
          role: "user",
          content: [{
            type: "text",
            text: `Return ONLY a valid JSON array of candidates.
                   Each candidate must have: id, name, email, role, match_score, skills, experience, location.
                   Do not include any extra text.
                   Job Role: ${formData.get("job_role")}
                   Description: ${formData.get("job_description")}
                   Required Skills: ${formData.get("required_skills")}
                   Min Experience: ${formData.get("min_experience")} years`
          }]
        }]
      };

      try {
        const res = await fetch(agentUrl, {
  method: "POST",
  headers: {
    "Content-Type": "application/json",
    "Authorization": "Bearer 40faJDvzNVYJkJw91JH0c5rWyCEowDoWXrnst3NzKOdqIoK89MxfJQQJ99CDACHYHv6XJ3w3AAAAACOGxTiA"
  },
  body: JSON.stringify(payload)
});

        const data = await res.json();
        console.log("Agent raw response:", data);

        let candidates = [];
        try {
          const output = data.output || [];
          const replyText = output[0]?.content?.[0]?.text;

          if (replyText) {
            candidates = JSON.parse(replyText);
          } else {
            alert("Agent response did not contain text. Check console for raw response.");
          }
        } catch (err) {
          alert("Agent did not return valid JSON: " + err.message);
        }

        renderCandidates(candidates);
      } catch (err) {
        alert("Error calling agent: " + err.message);
      }
    });

    // Render candidates with Approve/Reject buttons
    function renderCandidates(candidates) {
      const container = document.getElementById("candidates");
      container.innerHTML = "";
      if (!Array.isArray(candidates) || candidates.length === 0) {
        container.innerHTML = "<p>No candidates returned.</p>";
        return;
      }
      candidates.forEach(c => {
        const div = document.createElement("div");
        div.className = "candidate";
        div.innerHTML = `
          <strong>${c.name}</strong> (${c.role})<br>
          Email: ${c.email}<br>
          Skills: ${c.skills}<br>
          Experience: ${c.experience} years<br>
          Match Score: ${c.match_score}<br>
          <button onclick="sendDecision('${c.id}','approve')">Approve</button>
          <button onclick="sendDecision('${c.id}','reject')">Reject</button>
        `;
        container.appendChild(div);
      });
    }

    // For now, just update UI with decision (no backend call)
    function sendDecision(candidateId, status) {
      alert(`Decision '${status}' recorded for candidate ${candidateId}`);
    }
  </script>
</body>
</html>
